# /etc/nginx/sites-available/builder
# Drop this in and: sudo ln -s /etc/nginx/sites-available/builder /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 0k.au www.0k.au;

    # Car Builder
    location /builder {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Saved SVG downloads
    location /saved/ {
        proxy_pass http://127.0.0.1:5000;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
    }

    # Static assets served directly by nginx for speed (optional)
    # location /static/ {
    #     alias /home/pi/legends/builder/static/;
    # }
}
